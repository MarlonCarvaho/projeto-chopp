# ---------------------------------------------------------
# Conexão com o Banco de Dados (Preparado para Nuvem e Local)
# ---------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/projeto_chopp}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:010600}

# ---------------------------------------------------------
# Configurações do Hibernate (Tabelas)
# ---------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---------------------------------------------------------
# Configurações do Servidor e Upload de Imagens
# ---------------------------------------------------------
server.port=8081
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB