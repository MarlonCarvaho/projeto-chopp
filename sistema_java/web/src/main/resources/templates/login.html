<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Choperia — Entrar</title>
    <link rel="icon" th:href="@{/midia/favicon.png}" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0C0C10; color: #F0F0F8; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #13131A; padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.07); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-family: 'Syne', sans-serif; margin-bottom: 20px; }
        form { display: flex; flex-direction: column; gap: 15px; text-align: left; }
        input { width: 100%; padding: 14px; background: #0C0C10; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: white; outline: none;}
        button { background: #E88A00; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .erro-alerta { background: rgba(232, 64, 64, 0.1); color: #E84040; padding: 12px; border-radius: 10px; border: 1px solid rgba(232, 64, 64, 0.3); margin-bottom: 20px; }
        .sucesso-alerta { background: rgba(18, 168, 113, 0.1); color: #12A871; padding: 12px; border-radius: 10px; border: 1px solid rgba(18, 168, 113, 0.3); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Choperia Delivery</h1>
        <div th:if="${erro}" class="erro-alerta"><span th:text="${erro}"></span></div>
        <div th:if="${sucesso}" class="sucesso-alerta"><span th:text="${sucesso}"></span></div>
        <form action="/fazer_login" method="POST">
            <input type="email" name="email" placeholder="E-mail" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar no Sistema</button>
        </form>
        <p style="margin-top:25px; font-size:0.85em; color:#8A8A9E;">Não tem conta? <a href="/cadastro" style="color:#E88A00; text-decoration:none; font-weight:500;">Cadastre-se aqui</a></p>
    </div>
</body>
</html>
