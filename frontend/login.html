<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Projeto Chopp</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #FF8C00; text-align: center; margin-bottom: 20px; }
        input {
            width: 100%; padding: 10px; margin: 10px 0;
            background-color: #2c2c2c; color: white;
            border: 1px solid #444; border-radius: 5px; box-sizing: border-box;
        }
        input:focus { outline: none; border-color: #FF8C00; }
        .btn-laranja {
            width: 100%; background-color: #FF8C00; color: #121212;
            padding: 12px; border: none; border-radius: 5px;
            font-weight: bold; font-size: 1.1em; cursor: pointer;
            margin-top: 15px; transition: 0.3s;
        }
        .btn-laranja:hover { background-color: #e67e00; box-shadow: 0 0 10px #FF8C00; }
        .erro { color: #ff4d4d; text-align: center; font-weight: bold; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #FF8C00; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Acessar o Sistema</h2>
        
        {% if erro %} <p class="erro">{{ erro }}</p> {% endif %}

        <form action="/fazer_login" method="POST">
            <label>E-mail:</label>
            <input type="email" name="email" required>

            <label>Senha:</label>
            <input type="password" name="senha" required>

            <button type="submit" class="btn-laranja">Entrar</button>
        </form>

        <div class="links">
            <p>Ainda não tem conta? <a href="/cadastro">Cadastre-se aqui</a></p>
        </div>
    </div>

</body>
</html>
