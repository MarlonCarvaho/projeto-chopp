<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choperia — Finalizar Pedido</title>
    
    <link rel="icon" th:href="@{/midia/favicon.png}" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --amber:      #E88A00;
            --amber-glow: rgba(232, 138, 0, 0.18);
            --amber-soft: rgba(232, 138, 0, 0.08);
            --green:      #12A871;
            --green-soft: rgba(18, 168, 113, 0.12);
            --red:        #E84040;
            --red-soft:   rgba(232, 64, 64, 0.10);

            --bg:         #0C0C10;
            --surface:    #13131A;
            --surface-2:  #1C1C28;
            --border:     rgba(255,255,255,0.07);
            --border-2:   rgba(255,255,255,0.12);
            --text:       #F0F0F8;
            --text-muted: #8A8A9E;
            --text-dim:   #5A5A6E;

            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
        }

        html { scroll-behavior: smooth; }

        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; font-size: 16px; min-height: 100vh; padding-bottom: 60px; }
        
        .navbar { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(16px, 4vw, 40px); background: rgba(12,12,16,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-logo { display: flex; align-items: center; text-decoration: none; }
        .btn-back { display: flex; align-items: center; gap: 7px; padding: 8px 16px; background: var(--surface-2); border: 1px solid var(--border-2); border-radius: var(--radius-sm); color: var(--text-muted); font-size: 0.875rem; font-weight: 500; text-decoration: none; transition: all 0.2s; }
        .btn-back:hover { color: var(--text); border-color: var(--border-2); background: var(--border-2); }

        .page { max-width: 1100px; margin: 0 auto; padding: clamp(24px, 4vw, 48px) clamp(16px, 4vw, 40px); display: grid; grid-template-columns: 1fr minmax(0, 400px); gap: 28px; align-items: start; }
        @media (max-width: 768px) { .page { grid-template-columns: 1fr; } }

        .page-title { font-family: 'Syne', sans-serif; font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 800; letter-spacing: -0.02em; color: var(--text); margin-bottom: 28px; grid-column: 1 / -1; }
        .section-label { display: inline-flex; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--amber); margin-bottom: 10px; }
        .section-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; }

        .box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: clamp(18px, 3vw, 28px); margin-bottom: 20px; }

        .order-table { width: 100%; border-collapse: collapse; }
        .order-table th { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-dim); padding: 0 0 12px 0; text-align: left; border-bottom: 1px solid var(--border); }
        .order-table th:last-child { text-align: right; }
        .order-table td { padding: 13px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
        .order-table td:last-child { text-align: right; color: var(--green); font-weight: 600; font-size: 0.95rem; white-space: nowrap; }
        .order-table tr:last-child td { border-bottom: none; }

        .item-name { font-size: 0.9rem; font-weight: 500; margin-bottom: 2px; }
        .item-var  { font-size: 0.78rem; color: var(--text-muted); }
        .item-qty  { font-size: 0.82rem; color: var(--text-dim); }

        .total-row { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; margin-top: 4px; border-top: 1px solid var(--border-2); }
        .total-label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
        .total-value { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--green); }

        .empty-cart { text-align: center; padding: 32px 0; color: var(--text-dim); }
        .empty-cart i { font-size: 2rem; margin-bottom: 8px; display: block; opacity: 0.5; }
        .empty-cart p { font-size: 0.9rem; }
        .empty-cart a { color: var(--amber); text-decoration: none; }

        .sidebar { display: flex; flex-direction: column; gap: 20px; }

        .radio-list { display: flex; flex-direction: column; gap: 10px; }
        .radio-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; background: var(--bg); border: 1px solid var(--border-2); border-radius: var(--radius-md); cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; }
        .radio-item:has(input:checked) { border-color: var(--amber); background: var(--amber-soft); }
        .radio-item input[type="radio"] { accent-color: var(--amber); width: 16px; height: 16px; flex-shrink: 0; }
        .radio-info { flex: 1; }
        .radio-name { font-size: 0.9rem; font-weight: 500; color: var(--text); }
        .radio-desc { font-size: 0.78rem; color: var(--text-muted); margin-top: 1px; }
        .radio-icon { color: var(--text-dim); font-size: 1.2rem; }
        .radio-item:has(input:checked) .radio-icon { color: var(--amber); }

        .address-field { margin-top: 12px; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to   { opacity: 1; transform: translateY(0); } }
        .field-label { font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; display: block; }
        .field-input { width: 100%; padding: 11px 14px; background: var(--bg); border: 1px solid var(--border-2); border-radius: var(--radius-sm); color: var(--text); font-size: 0.9rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        .field-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(232,138,0,0.1); }
        .field-input::placeholder { color: var(--text-dim); }

        .btn-finalizar { width: 100%; padding: 15px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-md); font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; }
        .btn-finalizar:hover { background: #0f9460; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(18,168,113,0.35); }
        .btn-finalizar:active { transform: translateY(0); }

        .trust-strip { display: flex; gap: 14px; justify-content: center; padding: 14px 0 0; color: var(--text-dim); font-size: 0.78rem; }
        .trust-item { display: flex; align-items: center; gap: 5px; }
        .trust-item i { color: var(--green); font-size: 1rem; }
    </style>
</head>
<body>

    <nav class="navbar" role="navigation" aria-label="Navegação">
        <a class="nav-logo" href="/cliente">
            <img th:src="@{/midia/logo.png}" alt="Projeto Chopp" style="height: 100px; width: auto; object-fit: contain;">
        </a>
        <a href="/cliente" class="btn-back">
            <i class="ph-bold ph-arrow-left" aria-hidden="true"></i>
            Voltar à vitrine
        </a>
    </nav>

    <main class="page" role="main">

        <h1 class="page-title">Finalizar Pedido</h1>

        <section aria-labelledby="summary-title">
            <div class="box">
                <div class="section-label"><i class="ph ph-shopping-cart" aria-hidden="true"></i> Resumo</div>
                <h2 class="section-title" id="summary-title">Itens Selecionados</h2>
                <div id="containerCarrinho"></div>
            </div>
        </section>

        <aside class="sidebar" id="sidebarCheckout" style="display: none;">
            <form action="/finalizar_pedido" method="POST" onsubmit="prepararEnvio(event)" novalidate>
                
                <input type="hidden" name="produtos" id="inputProdutos">
                <input type="hidden" name="valor_total" id="inputValorTotal">

                <div class="box">
                    <div class="section-label"><i class="ph ph-user" aria-hidden="true"></i> Seus Dados</div>
                    <h2 class="section-title">Informações de Contato</h2>
                    <div class="address-field" style="display:block;">
                        <label class="field-label" for="cliente">Nome Completo</label>
                        <input type="text" id="cliente" name="cliente" class="field-input" placeholder="Digite seu nome para o pedido" required>
                    </div>
                </div>

                <div class="box">
                    <div class="section-label"><i class="ph ph-truck" aria-hidden="true"></i> Entrega</div>
                    <h2 class="section-title">Método de Entrega</h2>

                    <div class="radio-list" role="group" aria-label="Escolha o método de entrega">
                        <label class="radio-item">
                            <input type="radio" name="tipo_entrega" value="retirada" checked onchange="toggleEndereco()">
                            <div class="radio-icon"><i class="ph ph-storefront" aria-hidden="true"></i></div>
                            <div class="radio-info"><div class="radio-name">Retirada na Loja</div><div class="radio-desc">Retire no nosso estabelecimento</div></div>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="tipo_entrega" value="entrega" onchange="toggleEndereco()">
                            <div class="radio-icon"><i class="ph ph-map-pin" aria-hidden="true"></i></div>
                            <div class="radio-info"><div class="radio-name">Entrega no Endereço</div><div class="radio-desc">Receba onde você estiver</div></div>
                        </label>
                    </div>

                    <div id="div-endereco" class="address-field" style="display:none;">
                        <label class="field-label" for="endereco">Endereço de Entrega</label>
                        <input type="text" id="endereco" name="endereco" class="field-input" placeholder="Rua, Número, Bairro, Cidade">
                    </div>
                </div>

                <div class="box">
                    <div class="section-label"><i class="ph ph-credit-card" aria-hidden="true"></i> Pagamento</div>
                    <h2 class="section-title">Forma de Pagamento</h2>

                    <div class="radio-list" role="group" aria-label="Escolha a forma de pagamento">
                        <label class="radio-item">
                            <input type="radio" name="pagamento" value="pix" checked>
                            <div class="radio-icon"><i class="ph ph-qr-code" aria-hidden="true"></i></div>
                            <div class="radio-info"><div class="radio-name">PIX</div><div class="radio-desc">Aprovação imediata</div></div>
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="pagamento" value="cartao">
                            <div class="radio-icon"><i class="ph ph-credit-card" aria-hidden="true"></i></div>
                            <div class="radio-info"><div class="radio-name">Cartão de Crédito / Débito</div><div class="radio-desc">Maquininha na entrega</div></div>
                        </label>
                    </div>

                    <div style="margin-top: 20px;">
                        <button type="submit" class="btn-finalizar">
                            <i class="ph-bold ph-check-circle" aria-hidden="true"></i> Confirmar Pedido
                        </button>
                    </div>

                    <div class="trust-strip" aria-label="Garantias">
                        <div class="trust-item"><i class="ph ph-shield-check" aria-hidden="true"></i> Compra segura</div>
                        <div class="trust-item"><i class="ph ph-clock" aria-hidden="true"></i> Envio rápido</div>
                        <div class="trust-item"><i class="ph ph-headset" aria-hidden="true"></i> Suporte ativo</div>
                    </div>
                </div>
            </form>
        </aside>

    </main>

    <script>
        const carrinho = JSON.parse(localStorage.getItem('carrinhoChopp')) || [];
        
        function carregarResumo() {
            const container = document.getElementById('containerCarrinho');
            const sidebar = document.getElementById('sidebarCheckout');

            if (carrinho.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="ph ph-shopping-cart" aria-hidden="true"></i>
                        <p>Seu carrinho está vazio. <a href="/cliente">Adicione produtos</a>.</p>
                    </div>`;
                sidebar.style.display = 'none';
                return;
            }

            sidebar.style.display = 'flex';

            let tableHTML = `
                <table class="order-table" role="table">
                    <thead><tr><th scope="col">Item</th><th scope="col">Qtd.</th><th scope="col">Subtotal</th></tr></thead>
                    <tbody>`;
            
            let totalPedido = 0;

            carrinho.forEach(item => {
                const subtotal = item.preco * item.quantidade;
                totalPedido += subtotal;
                tableHTML += `<tr><td><div class="item-name">${item.nome}</div><div class="item-var">Volume / Padrão</div></td><td><div class="item-qty">${item.quantidade}x</div></td><td>R$ ${subtotal.toFixed(2).replace('.', ',')}</td></tr>`;
            });

            tableHTML += `</tbody></table>
                <div class="total-row"><span class="total-label">Total</span><span class="total-value">R$ ${totalPedido.toFixed(2).replace('.', ',')}</span></div>`;
            container.innerHTML = tableHTML;
        }

        function toggleEndereco() {
            const tipo = document.querySelector('input[name="tipo_entrega"]:checked').value;
            const div = document.getElementById('div-endereco');
            const input = document.getElementById('endereco');

            if (tipo === 'entrega') { div.style.display = 'block'; input.required = true; } 
            else { div.style.display = 'none'; input.required = false; input.value = ''; }
        }

        function prepararEnvio(event) {
            const tipo = document.querySelector('input[name="tipo_entrega"]:checked').value;
            const inputEndereco = document.getElementById('endereco');
            if (tipo === 'retirada') { inputEndereco.value = "Retirada na Loja"; }

            // Empacota o texto dos produtos
            const textoProdutos = carrinho.map(item => `${item.quantidade}x ${item.nome}`).join(' | ');
            document.getElementById('inputProdutos').value = textoProdutos;

            // Calcula o valor exato para o banco de dados
            const totalDinheiro = carrinho.reduce((soma, item) => soma + (item.preco * item.quantidade), 0);
            
            // AJUSTE: Formata no padrão brasileiro (ex: 1.250,00) para o Java conseguir dar Parse corretamente
            const valorFormatado = totalDinheiro.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('inputValorTotal').value = valorFormatado;

            localStorage.removeItem('carrinhoChopp');
        }

        carregarResumo();
    </script>
</body>
</html>
