<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Chopp</title>
    <style>
        /* Paleta de Cores: Preto e Laranja Gourmet */
        body {
            background-color: #121212; /* Preto profundo */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px;
        }
        h1 {
            color: #FF8C00; /* Laranja Chopp */
            font-size: 3em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            color: #cccccc;
        }
        .btn-laranja {
            background-color: #FF8C00;
            color: #121212;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            display: inline-block;
        }
        .btn-laranja:hover {
            background-color: #e67e00;
            box-shadow: 0 0 15px #FF8C00;
        }
    </style>
</head>
<body>

    <h1>🍺 Projeto Chopp</h1>
    <p>O melhor sistema de controle de estoque e pedidos.</p>
    
    <a href="/login" class="btn">Fazer Login</a>

</body>
</html>
